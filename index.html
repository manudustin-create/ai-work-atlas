<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI & Work</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500&family=Noto+Sans+Symbols+2&display=swap');
        
        :root {
            --black: #111;
            --grey-90: #222;
            --grey-70: #555;
            --grey-50: #888;
            --grey-30: #bbb;
            --grey-15: #ddd;
            --grey-05: #f4f4f4;
            --white: #fafafa;
            --accent: #b8860b;
            --accent-bg: rgba(184, 134, 11, 0.08);
            
            --c-augment: #2d6a6a;
            --c-govern: #8b4049;
            --c-meaning: #5e4a6e;
            --c-extract: #5a6340;
            --c-judge: #6b5344;
            --c-architect: #3d5a80;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body { 
            height: 100%; 
            font-size: 15px; 
        }
        
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--white);
            color: var(--black);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ═══════════════════════════════════════
           LENSES
        ═══════════════════════════════════════ */
        .lenses {
            padding: 6px 20px;
            border-bottom: 1px solid var(--grey-15);
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--white);
            flex-shrink: 0;
        }

        .lenses-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            color: var(--grey-50);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .lens-group {
            display: flex;
            gap: 3px;
        }

        .lens {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            padding: 6px 10px;
            background: transparent;
            border: 1px solid var(--grey-15);
            color: var(--grey-50);
            cursor: pointer;
            transition: all 0.1s;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 6px;
        }

        .lens:hover {
            border-color: var(--grey-30);
            color: var(--grey-70);
        }

        .lens.active {
            background: var(--accent-bg);
            border-color: var(--accent);
            color: var(--accent);
        }

        .lens-icon {
            display: inline-flex;
            width: 16px;
            height: 16px;
        }

        .lens-icon svg {
            width: 100%;
            height: 100%;
        }

        .lens-code { 
            font-weight: 700;
            font-size: 0.6rem;
            letter-spacing: 0.02em;
        }
        .lens-sublabel { display: none; }

        .spacer { flex: 1; }

        .search {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            padding: 5px 10px;
            border: 1px solid var(--grey-15);
            background: transparent;
            color: var(--black);
            width: 120px;
            outline: none;
        }
        .search:focus { border-color: var(--grey-30); }
        .search::placeholder { color: var(--grey-30); }

        .reset-btn {
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            padding: 5px 10px;
            background: transparent;
            border: 1px solid var(--grey-15);
            color: var(--grey-50);
            cursor: pointer;
        }
        .reset-btn:hover { border-color: var(--grey-30); color: var(--black); }

        /* View Switch */
        .view-switch {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            user-select: none;
        }

        .view-switch input {
            display: none;
        }

        .switch-track {
            position: relative;
            width: 32px;
            height: 16px;
            background: var(--grey-15);
            border-radius: 8px;
            transition: background 0.2s;
        }

        .switch-thumb {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 12px;
            height: 12px;
            background: var(--grey-50);
            border-radius: 50%;
            transition: transform 0.2s, background 0.2s;
        }

        .view-switch input:checked + .switch-track {
            background: var(--accent-bg);
        }

        .view-switch input:checked + .switch-track .switch-thumb {
            transform: translateX(16px);
            background: var(--accent);
        }

        .switch-labels {
            display: flex;
            gap: 2px;
            font-family: 'Space Mono', monospace;
            font-size: 0.55rem;
            text-transform: uppercase;
        }

        .switch-label-txt,
        .switch-label-img {
            padding: 2px 4px;
            color: var(--grey-30);
            transition: color 0.2s;
        }

        .switch-label-txt {
            color: var(--grey-70);
        }

        .view-switch input:checked ~ .switch-labels .switch-label-txt {
            color: var(--grey-30);
        }

        .view-switch input:checked ~ .switch-labels .switch-label-img {
            color: var(--accent);
        }

        /* ═══════════════════════════════════════
           TOP BAR - Bands + Esiti
        ═══════════════════════════════════════ */
        .top-bar {
            display: flex;
            gap: 20px;
            padding: 10px 20px;
            border-bottom: 1px solid var(--grey-15);
            flex-shrink: 0;
            align-items: stretch;
        }

        .bands {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .band {
            padding: 8px 12px;
            background: var(--grey-05);
            border-left: 3px solid var(--grey-30);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .band.band-s0 { border-left-color: var(--c-architect); }
        .band.band-ex { border-left-color: var(--c-extract); }

        .band-tag {
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            font-weight: 700;
            padding: 2px 5px;
            background: var(--accent-bg);
            color: var(--accent);
        }

        .band-title {
            font-family: 'Space Mono', monospace;
            font-size: 0.55rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--black);
            min-width: 180px;
        }

        .band-text {
            font-size: 0.6rem;
            color: var(--grey-70);
            line-height: 1.35;
            flex: 1;
        }

        .band-link {
            font-family: 'Space Mono', monospace;
            font-size: 0.55rem;
            color: var(--accent);
            cursor: pointer;
            text-decoration: underline;
        }
        .band-link:hover { color: var(--black); }

        /* Esiti Compact - REMOVED */

        /* ═══════════════════════════════════════
           MAIN LAYOUT
        ═══════════════════════════════════════ */
        .main-layout {
            flex: 1;
            display: flex;
            overflow: hidden;
            min-height: 0;
        }

        .matrix-area {
            flex: 1;
            padding: 20px 20px 12px 36px;
            overflow: auto;
            min-height: 0;
        }

        .side-panel {
            width: 300px;
            border-left: 1px solid var(--grey-15);
            background: var(--white);
            flex-shrink: 0;
            overflow-y: auto;
        }

        /* ═══════════════════════════════════════
           MATRIX
        ═══════════════════════════════════════ */
        .matrix-wrap {
            position: relative;
            display: inline-block;
            margin-left: 18px;
            margin-top: 26px;
        }

        .axis {
            position: absolute;
            pointer-events: none;
        }

        .axis-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.55rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--grey-50);
            line-height: 1;
            white-space: nowrap;
        }

        .axis-arrow {
            display: block;
        }

        .axis-x {
            top: -20px;
            left: 110px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .axis-arrow-x {
            width: 60px;
            height: 6px;
        }

        .axis-y {
            top: 50px;
            left: -16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .axis-y .axis-label {
            writing-mode: vertical-rl;
            transform: rotate(180deg);
        }

        .axis-arrow-y {
            width: 6px;
            height: 60px;
        }

        .matrix {
            display: grid;
            /* grid-template-columns/rows impostati da buildMatrix() */
            max-width: 1200px;
            width: 100%;
            align-content: start;
        }

        .matrix-corner {
            border-right: 1px solid var(--black);
            border-bottom: 1px solid var(--black);
        }

        .col-head {
            padding: 10px 8px 12px;
            border-bottom: 1px solid var(--black);
            text-align: left;
        }

        .col-head h2 {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--black);
        }

        .col-head p {
            font-size: 0.6rem;
            color: var(--grey-50);
            margin-top: 2px;
        }

        .subhead-corner {
            border-right: 1px solid var(--black);
            border-bottom: 1px solid var(--black);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 6px;
            background: var(--grey-05);
        }

        .subhead-corner span {
            font-family: 'Space Mono', monospace;
            font-size: 0.5rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--grey-50);
            cursor: help;
        }

        .sub-head {
            padding: 6px 8px;
            border-bottom: 1px solid var(--black);
            background: var(--grey-05);
        }

        .sub-head-content {
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            color: var(--grey-70);
        }

        .sub-head-chips {
            display: flex;
            gap: 3px;
            margin-top: 3px;
        }

        .sub-head-chip {
            font-family: 'Space Mono', monospace;
            font-size: 0.5rem;
            font-weight: 700;
            padding: 1px 4px;
            background: var(--accent-bg);
            color: var(--accent);
        }

        /* Full-width INFORG overlay strip */
        .inforg-strip {
            grid-column: 2 / -1;
            background: var(--grey-05);
            border-bottom: 1px solid var(--black);
            display: grid;
            /* grid-template-columns impostato da buildMatrix() */
            gap: 0;
            padding: 6px 0;
            align-items: center;
        }
        
        .inforg-cell {
            padding: 5px 8px;
            border-right: 1px solid var(--black);
            display: flex;
            align-items: center;
            justify-content: center;
            
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: lowercase;
            color: var(--grey-50);
            
            cursor: help;
            transition: color 0.15s ease;
        }
        
        .inforg-cell:last-child {
            border-right: none;
        }
        
        .inforg-cell:hover {
            color: var(--accent);
        }
        

        
        /* Anthropological label for Worker row cells */
        .cell-anthro-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent);
            margin-bottom: 4px;
            opacity: 0.85;
        }

        .row-head {
            padding: 10px 8px;
            border-right: 1px solid var(--black);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: flex-start;
            gap: 4px;
        }

        .row-head h2 {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--black);
        }

        .row-sub {
            font-family: 'Space Mono', monospace;
            font-size: 0.5rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: var(--grey-50);
        }

        .cell {
            padding: 0;
            border-bottom: 1px solid var(--grey-15);
            border-right: 1px solid var(--grey-15);
            min-height: 110px;
            position: relative;
        }

        .cell-inner {
            width: 100%;
            height: 100%;
            min-height: 110px;
            position: relative;
        }

        .cell-front {
            width: 100%;
            height: 100%;
            min-height: 110px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
            background: var(--white);
            position: relative;
            box-sizing: border-box;
        }

        .cell-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            min-height: 110px;
            overflow: hidden;
            background: #333;
            display: none;
        }

        .cell-back img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(10%);
        }

        /* Placeholder for cells without image */
        .cell-placeholder {
            width: 100%;
            height: 100%;
            min-height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--grey-05);
            color: var(--grey-30);
            font-family: 'Space Mono', monospace;
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* View Images mode */
        .matrix.view-images .cell-front {
            display: none;
        }

        .matrix.view-images .cell-back {
            display: block;
        }

        /* ═══════════════════════════════════════
           CELL KEYWORDS
        ═══════════════════════════════════════ */
        .cell-kws {
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            color: var(--grey-70);
            line-height: 1.25;
            width: 100%;
            margin-bottom: 4px;
        }

        .cell-kws.empty {
            color: var(--grey-30);
        }

        .cell-empty-note {
            font-family: 'Space Mono', monospace;
            font-size: 0.5rem;
            font-style: italic;
            color: var(--grey-40);
            line-height: 1.3;
            padding: 4px 6px;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 3px,
                rgba(0,0,0,0.015) 3px,
                rgba(0,0,0,0.015) 6px
            );
            border-radius: 2px;
            width: 100%;
        }

        .cell-empty-note .ref {
            color: var(--grey-50);
            font-style: normal;
        }

        .cell-kws-note {
            font-family: 'Space Mono', monospace;
            font-size: 0.5rem;
            color: var(--grey-50);
            line-height: 1.2;
            margin-top: -2px;
            margin-bottom: 4px;
        }

        /* ═══════════════════════════════════════
           TILES
        ═══════════════════════════════════════ */
        .tiles-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 100%;
        }

        .tile {
            cursor: pointer;
            transition: all 0.1s;
            padding: 3px 0 3px 6px;
            border-left: 2px solid var(--grey-15);
        }

        .tile:hover {
            background: var(--grey-05);
        }

        .tile.active { 
            background: var(--accent-bg);
        }

        .tile.dim { opacity: 0.15; }

        .tile.highlight {
            background: var(--accent-bg);
        }

        .tile[data-f="Augment"] { border-left-color: var(--c-augment); }
        .tile[data-f="Govern"] { border-left-color: var(--c-govern); }
        .tile[data-f="Meaning"] { border-left-color: var(--c-meaning); }
        .tile[data-f="Extract"] { border-left-color: var(--c-extract); }
        .tile[data-f="Judge"] { border-left-color: var(--c-judge); }
        .tile[data-f="Architect"] { border-left-color: var(--c-architect); }

        .tile-name {
            font-size: 0.68rem;
            color: var(--grey-70);
            line-height: 1.3;
        }

        .tile-ovrow {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 0px;
            margin-bottom: 3px;
        }

        .ov-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }

        .ov-sym {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            color: var(--grey-70);
            opacity: 0.95;
            transition: color 0.1s;
        }

        .ov-sym svg {
            width: 100%;
            height: 100%;
        }

        .ov-code {
            font-family: 'Space Mono', monospace;
            font-size: 0.55rem;
            font-weight: 700;
            color: var(--grey-70);
            opacity: 0.75;
            transition: opacity 0.15s;
            margin-left: 0px;
        }

        .ov-badge:hover .ov-code {
            opacity: 1;
        }

        .tile.highlight .ov-sym,
        .tile.active .ov-sym {
            color: var(--accent);
        }

        .tile.highlight .ov-code,
        .tile.active .ov-code {
            opacity: 1;
            color: var(--accent);
        }

        /* Esiti styles now in top-bar section */

        /* ═══════════════════════════════════════
           SIDE PANEL CONTENT
        ═══════════════════════════════════════ */
        .panel-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 300px;
            text-align: center;
            color: var(--grey-30);
            padding: 24px;
        }

        .panel-placeholder-icon {
            font-size: 2rem;
            margin-bottom: 12px;
            opacity: 0.4;
        }

        .panel-placeholder-text {
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .panel-placeholder-hint {
            font-size: 0.65rem;
            margin-top: 8px;
            color: var(--grey-50);
        }

        .panel-content {
            padding: 20px;
        }

        .panel-header { margin-bottom: 16px; }

        .panel-id {
            font-family: 'Space Mono', monospace;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1;
        }

        .panel-name {
            font-size: 0.95rem;
            font-weight: 500;
            margin-top: 4px;
            color: var(--black);
        }

        .panel-meta {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .panel-tag {
            font-family: 'Space Mono', monospace;
            font-size: 0.58rem;
            color: var(--grey-50);
        }

        .panel-tag span { color: var(--black); }

        .panel-overlays {
            margin-top: 10px;
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .panel-overlay {
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            padding: 2px 5px;
            background: var(--accent-bg);
            color: var(--accent);
        }

        .panel-close {
            margin-top: 12px;
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            color: var(--grey-50);
            cursor: pointer;
            text-decoration: underline;
        }
        .panel-close:hover { color: var(--black); }

        .panel-body {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .panel-section h3 {
            font-family: 'Space Mono', monospace;
            font-size: 0.52rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--grey-50);
            margin-bottom: 5px;
        }

        .panel-section p,
        .panel-section li {
            font-size: 0.78rem;
            line-height: 1.45;
            color: var(--grey-70);
        }

        .panel-section ul { list-style: none; }
        .panel-section li::before { content: '→ '; color: var(--grey-30); }
        .panel-section li { margin-bottom: 2px; }

        .panel-callout {
            padding: 8px 10px;
            background: var(--grey-05);
            border-left: 2px solid var(--grey-30);
            font-size: 0.78rem;
        }

        .panel-callout.failure { border-color: var(--c-govern); }
        .panel-callout.guardrail { border-color: var(--c-augment); }

        .panel-sources {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .panel-source {
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            color: var(--grey-50);
        }

        /* ═══════════════════════════════════════
           LEGEND
        ═══════════════════════════════════════ */
        .legend {
            padding: 6px 20px;
            border-top: 1px solid var(--grey-15);
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            font-size: 0.55rem;
            color: var(--grey-50);
            flex-shrink: 0;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .legend-color {
            width: 12px;
            height: 3px;
        }

        .legend-color.augment { background: var(--c-augment); }
        .legend-color.govern { background: var(--c-govern); }
        .legend-color.meaning { background: var(--c-meaning); }
        .legend-color.extract { background: var(--c-extract); }
        .legend-color.judge { background: var(--c-judge); }
        .legend-color.architect { background: var(--c-architect); }

        .legend-sep {
            width: 1px;
            height: 12px;
            background: var(--grey-15);
            margin: 0 6px;
        }

        .legend-item.legend-sym {
            gap: 6px;
        }

        .legend-symb {
            font-family: 'Noto Sans Symbols 2', 'Segoe UI Symbol', 'Apple Symbols', 'Noto Sans Symbols2', system-ui;
            font-size: 1.2rem;
            line-height: 1;
            color: var(--grey-70);
        }

        /* Background effects for lens */
        .matrix.show-s0 .cell[data-has-s0="true"] .cell-front { background: rgba(61, 90, 128, 0.06); }
        .matrix.show-ex .cell[data-has-ex="true"] .cell-front { background: rgba(90, 99, 64, 0.06); }

        /* ═══════════════════════════════════════
           RESPONSIVE
        ═══════════════════════════════════════ */
        @media (max-width: 1100px) {
            .side-panel { width: 280px; }
        }

        @media (max-width: 900px) {
            .top-bar { flex-direction: column; }
        }

        @media (max-width: 800px) {
            .main-layout { flex-direction: column; }
            .side-panel { 
                width: 100%; 
                border-left: none; 
                border-top: 1px solid var(--grey-15);
                max-height: 45vh;
            }
            .top-bar { display: none; }
        }
    </style>
</head>
<body>

<nav class="lenses">
    <span class="lenses-label">Lenti</span>
    <div class="lens-group" id="lenses"></div>
    <div class="spacer"></div>
    <input type="text" class="search" id="search" placeholder="Cerca...">
    <button class="reset-btn" id="reset">Reset</button>
    <label class="view-switch">
        <input type="checkbox" id="view-toggle">
        <span class="switch-track"><span class="switch-thumb"></span></span>
        <span class="switch-labels"><span class="switch-label-txt">Txt</span><span class="switch-label-img">Img</span></span>
    </label>
</nav>

<section class="top-bar">
    <div class="bands" id="bands"></div>
</section>

<div class="main-layout">
    <main class="matrix-area">
        <div class="matrix-wrap" aria-label="Matrice AI & Work con assi">
            <div class="axis axis-x">
                <div class="axis-label">Socio-technical roles of AI in work</div>
                <svg class="axis-arrow axis-arrow-x" viewBox="0 0 120 10" preserveAspectRatio="none" aria-hidden="true">
                    <defs>
                        <marker id="arrow-x" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
                            <path d="M0,0 L6,3 L0,6 Z" fill="var(--grey-30)"></path>
                        </marker>
                    </defs>
                    <line x1="0" y1="5" x2="118" y2="5" stroke="var(--grey-30)" stroke-width="1" marker-end="url(#arrow-x)"></line>
                </svg>
            </div>

            <div class="axis axis-y">
                <div class="axis-label">Governance scale</div>
                <svg class="axis-arrow axis-arrow-y" viewBox="0 0 10 120" preserveAspectRatio="none" aria-hidden="true">
                    <defs>
                        <marker id="arrow-y" markerWidth="6" markerHeight="6" refX="3" refY="5" orient="auto">
                            <path d="M0,0 L6,0 L3,6 Z" fill="var(--grey-30)"></path>
                        </marker>
                    </defs>
                    <line x1="5" y1="0" x2="5" y2="118" stroke="var(--grey-30)" stroke-width="1" marker-end="url(#arrow-y)"></line>
                </svg>
            </div>

            <div class="matrix" id="matrix"></div>
        </div>
    </main>
    
    <aside class="side-panel" id="side-panel">
        <div class="panel-placeholder" id="panel-placeholder">
            <div class="panel-placeholder-icon">◇</div>
            <div class="panel-placeholder-text">Seleziona un elemento</div>
            <div class="panel-placeholder-hint">Click su un tile per vedere i dettagli</div>
        </div>
        <div class="panel-content" id="panel-content" style="display:none;"></div>
    </aside>
</div>

<footer class="legend">
    <div class="legend-item"><span class="legend-color augment"></span> Augment</div>
    <div class="legend-item"><span class="legend-color govern"></span> Govern</div>
    <div class="legend-item"><span class="legend-color meaning"></span> Meaning</div>
    <div class="legend-item"><span class="legend-color extract"></span> Extract</div>
    <div class="legend-item"><span class="legend-color judge"></span> Judge</div>
    <div class="legend-item"><span class="legend-color architect"></span> Architect</div>
    <div class="legend-sep"></div>
    <div class="legend-item legend-sym"><span class="legend-symb">●</span> costitutivo/dominante</div>
    <div class="legend-item legend-sym"><span class="legend-symb">◐</span> rilevante ma non dominante</div>
    <div class="legend-item legend-sym"><span class="legend-symb">○</span> indiretto / effetto laterale</div>
</footer>

<script src="data.js"></script>
<script>
var _DATA_OK = typeof DATA !== 'undefined' && typeof COLS !== 'undefined';
if (!_DATA_OK) console.error('[AI&Work Atlas] data.js non caricato!');
var lens = null;

var OV_SVG = {
    S0: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M4 10 A8 8 0 0 1 20 10"/><line x1="12" y1="10" x2="12" y2="18"/><circle cx="12" cy="20" r="2"/></svg>',
    EX: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="18" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="12" cy="6" r="1.5" fill="currentColor" stroke="none"/><line x1="6" y1="7.5" x2="12" y2="18"/><line x1="18" y1="7.5" x2="12" y2="18"/><line x1="12" y1="7.5" x2="12" y2="18"/></svg>',
    K: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="4" x2="8" y2="20"/><line x1="8" y1="12" x2="16" y2="4"/><line x1="8" y1="12" x2="16" y2="20"/></svg>',
    T: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="14" r="2"/><circle cx="18" cy="14" r="2"/><line x1="8" y1="14" x2="16" y2="14"/><path d="M6 12 A6 6 0 0 1 18 12"/></svg>',
    N: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="4" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="20" cy="12" r="2"/><line x1="6" y1="12" x2="10" y2="12"/><line x1="14" y1="12" x2="18" y2="12"/></svg>',
    CT: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="12" r="2"/><circle cx="19" cy="12" r="2"/><path d="M7 12 L10 8 L14 16 L17 12"/></svg>',
    G: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="4" x2="6" y2="20"/><line x1="18" y1="4" x2="18" y2="20"/><line x1="12" y1="8" x2="12" y2="16"/></svg>'
};

var OV_ICON = OV_SVG;

function $(s) { return document.querySelector(s); }
function $$(s) { return document.querySelectorAll(s); }

function validateData() {
    var colKeys = COLS.map(function(c) { return c.k; });
    var warns = [];
    DATA.forEach(function(d) {
        if (!d.role) warns.push('DATA id="' + d.id + '" ha role null (manca in ROLE map)');
        if (d.role && colKeys.indexOf(d.role) === -1) warns.push('DATA id="' + d.id + '" role="' + d.role + '" non corrisponde a nessuna colonna');
        if (ROWS.indexOf(d.layer) === -1) warns.push('DATA id="' + d.id + '" layer="' + d.layer + '" non corrisponde a nessuna riga');
    });
    ROWS.forEach(function(row) {
        colKeys.forEach(function(col) {
            var items = DATA.filter(function(d) { return d.layer === row && d.role === col; });
            var hasKw = CELL_KWS[row] && CELL_KWS[row][col] && CELL_KWS[row][col] !== '—';
            if (items.length > 0 && !hasKw) warns.push('Cella ' + row + '×' + col + ': ha ' + items.length + ' tile ma manca in CELL_KWS');
        });
    });
    if (warns.length) {
        console.warn('[AI&Work Atlas] Validazione dati (' + warns.length + ' warning):');
        warns.forEach(function(w) { console.warn('  ⚠ ' + w); });
    } else {
        console.log('[AI&Work Atlas] Validazione dati OK');
    }
}

function init() {
    validateData();
    buildBands();
    buildLenses();
    buildMatrix();
    $('#search').addEventListener('input', filter);
    $('#reset').addEventListener('click', resetView);
    $('#view-toggle').addEventListener('change', toggleView);
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') hideDetail(); });
    checkHash();
    window.addEventListener('hashchange', checkHash);
}



function buildBands() {
    var container = $('#bands');
    BANDS.forEach(function(b) {
        var div = document.createElement('div');
        div.className = 'band ' + b.css;

        var tag = document.createElement('span');
        tag.className = 'band-tag';
        tag.textContent = b.code;
        div.appendChild(tag);

        var title = document.createElement('span');
        title.className = 'band-title';
        title.textContent = b.title;
        div.appendChild(title);

        var text = document.createElement('p');
        text.className = 'band-text';
        text.textContent = b.text;
        div.appendChild(text);

        var link = document.createElement('span');
        link.className = 'band-link';
        link.textContent = 'Scheda →';
        link.onclick = function() { showDetail(b.link); };
        div.appendChild(link);

        container.appendChild(div);
    });
}

function buildLenses() {
    var c = $('#lenses');
    OVERLAYS.forEach(function(o) {
        var b = document.createElement('button');
        b.className = 'lens';
        b.dataset.code = o.c;
        b.innerHTML = '<span class="lens-icon">' + OV_SVG[o.c] + '</span><span class="lens-code">' + o.c + '</span>';
        b.title = o.l + ': ' + o.d;
        b.onclick = function() { toggleLens(o.c); };
        c.appendChild(b);
    });
}

function toggleLens(code) {
    lens = lens === code ? null : code;
    $$('.lens').forEach(function(b) { b.classList.toggle('active', b.dataset.code === lens); });
    
    var m = $('#matrix');
    m.classList.remove('show-s0', 'show-ex');
    if (lens === 'S0') m.classList.add('show-s0');
    if (lens === 'EX') m.classList.add('show-ex');
    
    filter();
}

function toggleView() {
    var m = $('#matrix');
    var isImages = $('#view-toggle').checked;
    m.classList.toggle('view-images', isImages);
}

function buildMatrix() {
    var m = $('#matrix');
    m.innerHTML = '';

    // Grid dinamica: colonne e righe calcolate da COLS/ROWS
    m.style.gridTemplateColumns = '100px repeat(' + COLS.length + ', 1fr)';
    m.style.gridTemplateRows = 'auto auto repeat(' + ROWS.length + ', minmax(110px, 1fr))';

    // Build header via DOM to avoid innerHTML += destroying event listeners
    var corner = document.createElement('div');
    corner.className = 'matrix-corner';
    m.appendChild(corner);
    
    COLS.forEach(function(c) {
        var ch = document.createElement('div');
        ch.className = 'col-head';
        ch.innerHTML = '<h2>' + c.t + '</h2><p>' + c.s + '</p>';
        m.appendChild(ch);
    });
    
    var subCorner = document.createElement('div');
    subCorner.className = 'subhead-corner';
    subCorner.innerHTML = '<span title="INFORG (Floridi): the self as an informational organism shaped within socio-technical infrastructures. This strip encodes: Identity / Datafied agency / Contestability per role.">Inforg</span>';
    m.appendChild(subCorner);

    var inforgStrip = document.createElement('div');
    inforgStrip.className = 'inforg-strip';
    inforgStrip.style.gridTemplateColumns = 'repeat(' + COLS.length + ', 1fr)';
    inforgStrip.innerHTML = COLS.map(function(col){
        var t = INFORG_TRIADS[col.k];
        if(!t) return '<div class="inforg-cell" title="—">—</div>';
        var visible = t.id;
        var tip = t.id + ' self — agency: ' + t.ag + ', contestability: ' + t.ct;
        return '<div class="inforg-cell" title="' + tip + '">' + visible + '</div>';
    }).join('');
    m.appendChild(inforgStrip);
    
    ROWS.forEach(function(row) {
        var rh = document.createElement('div');
        rh.className = 'row-head';
        rh.innerHTML = '<h2>' + row + '</h2><span class="row-sub">' + (ROW_SUB[row] || '') + '</span>';
        m.appendChild(rh);
        
        COLS.forEach(function(col) {
            var items = DATA.filter(function(d) { return d.layer === row && d.role === col.k; });
            var hasS0 = items.some(function(d) { return d.overlays.includes('S0'); });
            var hasEX = items.some(function(d) { return d.overlays.includes('EX'); });
            
            var cellKw = CELL_KWS[row] && CELL_KWS[row][col.k] ? CELL_KWS[row][col.k] : '—';
            var cellImg = CELL_IMAGES[row] && CELL_IMAGES[row][col.k] ? CELL_IMAGES[row][col.k] : null;
            var cellEmpty = CELL_EMPTY[row] && CELL_EMPTY[row][col.k] ? CELL_EMPTY[row][col.k] : null;
            
            var cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.hasS0 = hasS0;
            cell.dataset.hasEx = hasEX;
            
            // Cell inner container
            var inner = document.createElement('div');
            inner.className = 'cell-inner';
            
            // Front side (text)
            var front = document.createElement('div');
            front.className = 'cell-front';
            
            if (cellKw === '—' && cellEmpty) {
                // Empty cell with semantic annotation
                var emptyDiv = document.createElement('div');
                emptyDiv.className = 'cell-empty-note';
                var parts = cellEmpty.split('→');
                if (parts.length > 1) {
                    emptyDiv.innerHTML = parts[0] + '→ <span class="ref">' + parts[1].trim() + '</span>';
                } else {
                    emptyDiv.textContent = cellEmpty;
                }
                front.appendChild(emptyDiv);
            } else {
                // Add anthropological label for Worker row
                if (row === 'Worker' && ANTHRO_LABELS[col.k]) {
                    var anthroLabel = document.createElement('div');
                    anthroLabel.className = 'cell-anthro-label';
                    anthroLabel.textContent = ANTHRO_LABELS[col.k];
                    front.appendChild(anthroLabel);
                }
                
                var kwDiv = document.createElement('div');
                kwDiv.className = 'cell-kws' + (cellKw === '—' ? ' empty' : '');
                kwDiv.textContent = cellKw;
                front.appendChild(kwDiv);
            }
            
            if (items.length > 0) {
                var tilesContainer = document.createElement('div');
                tilesContainer.className = 'tiles-container';
                
                items.forEach(function(item) {
                    var t = document.createElement('div');
                    t.className = 'tile';
                    t.dataset.id = item.id;
                    t.dataset.f = item.family;
                    t.dataset.ov = item.overlays.join(',');
                    t.dataset.search = (item.id + ' ' + item.name + ' ' + item.definition + ' ' + cellKw + ' ' + item.overlays.join(' ')).toLowerCase();
                    var icons = item.overlays.map(function(o){
                        var sym = OV_ICON[o] || '•';
                        return '<span class="ov-badge" data-ov="' + o + '" title="' + o + '"><span class="ov-sym">' + sym + '</span><span class="ov-code">[' + o + ']</span></span>';
                    }).join('');
                    t.innerHTML =
                        '<div class="tile-ovrow">' + icons + '</div>' +
                        '<div class="tile-name">' + item.name + '</div>';
                    t.onclick = function() { showDetail(item.id); };
                    tilesContainer.appendChild(t);
                });
                
                front.appendChild(tilesContainer);
            }
            
            inner.appendChild(front);
            
            // Back side (image or placeholder)
            var back = document.createElement('div');
            back.className = 'cell-back';
            if (cellImg) {
                back.innerHTML = '<img src="' + cellImg + '" alt="' + row + ' / ' + col.k + '">';
            } else {
                var placeholder = document.createElement('div');
                placeholder.className = 'cell-placeholder';
                placeholder.textContent = 'no img';
                back.appendChild(placeholder);
            }
            inner.appendChild(back);
            
            cell.appendChild(inner);
            
            m.appendChild(cell);
        });
        

    });
}

function filter() {
    var q = $('#search').value.toLowerCase();
    
    $$('.tile').forEach(function(t) {
        var searchText = t.dataset.search || '';
        var ov = t.dataset.ov.split(',');
        
        var show = !q || searchText.includes(q);
        var highlight = lens && ov.includes(lens);
        var dim = lens && !highlight;
        
        t.classList.toggle('dim', dim && show);
        t.classList.toggle('highlight', highlight && show);
        t.style.display = show ? '' : 'none';
    });
}

function showDetail(id) {
    var item = DATA.find(function(d) { return d.id === id; });
    if (!item) return;

    var FAMILY_COLOR = {
        Augment:'--c-augment',
        Govern:'--c-govern',
        Meaning:'--c-meaning',
        Extract:'--c-extract',
        Judge:'--c-judge',
        Architect:'--c-architect'
    };

    $$('.tile').forEach(function(t) { t.classList.remove('active'); });
    var tileEl = document.querySelector('.tile[data-id="' + id + '"]');
    if (tileEl) tileEl.classList.add('active');

    history.replaceState(null, '', '#' + id);

    document.getElementById('panel-placeholder').style.display = 'none';
    var pc = document.getElementById('panel-content');
    pc.style.display = 'block';
    pc.innerHTML = '';

    // Helper: crea elemento con classe e testo
    function el(tag, cls, text) {
        var e = document.createElement(tag);
        if (cls) e.className = cls;
        if (text) e.textContent = text;
        return e;
    }

    // Header
    var header = el('div', 'panel-header');

    var idEl = el('div', 'panel-id', item.id);
    idEl.style.color = 'var(' + (FAMILY_COLOR[item.family] || '--grey-50') + ')';
    header.appendChild(idEl);

    header.appendChild(el('div', 'panel-name', item.name));

    var meta = el('div', 'panel-meta');
    [['Family', item.family], ['Layer', item.layer], ['Role', item.role || '—']].forEach(function(pair) {
        var tag = el('div', 'panel-tag');
        tag.textContent = pair[0] + ': ';
        var span = document.createElement('span');
        span.textContent = pair[1];
        tag.appendChild(span);
        meta.appendChild(tag);
    });
    header.appendChild(meta);

    var overlays = el('div', 'panel-overlays');
    item.overlays.forEach(function(o) {
        overlays.appendChild(el('span', 'panel-overlay', o));
    });
    header.appendChild(overlays);

    var close = el('div', 'panel-close', '✕ Chiudi');
    close.onclick = hideDetail;
    header.appendChild(close);

    pc.appendChild(header);

    // Body
    var body = el('div', 'panel-body');

    // Sezione generica
    function addSection(title, content) {
        var sec = el('div', 'panel-section');
        sec.appendChild(el('h3', null, title));
        sec.appendChild(content);
        body.appendChild(sec);
    }

    addSection('Definizione', el('p', null, item.definition));

    var ul = document.createElement('ul');
    item.signals.forEach(function(s) {
        ul.appendChild(el('li', null, s));
    });
    addSection('Segnali', ul);

    var failDiv = el('div', 'panel-callout failure', item.failure);
    addSection('Failure mode', failDiv);

    var guardDiv = el('div', 'panel-callout guardrail', item.guardrail);
    addSection('Guardrail', guardDiv);

    var srcDiv = el('div', 'panel-sources');
    item.sources.forEach(function(s, i) {
        if (i > 0) srcDiv.appendChild(document.createTextNode(' · '));
        srcDiv.appendChild(el('span', 'panel-source', s));
    });
    addSection('Sources', srcDiv);

    pc.appendChild(body);
}

function hideDetail() {
    $$('.tile').forEach(function(t) { t.classList.remove('active'); });
    document.getElementById('panel-placeholder').style.display = 'flex';
    document.getElementById('panel-content').style.display = 'none';
    history.replaceState(null, '', location.pathname);
}

function resetView() {
    lens = null;
    $$('.lens').forEach(function(b) { b.classList.remove('active'); });
    $('#matrix').classList.remove('show-s0', 'show-ex', 'view-images');
    $('#view-toggle').checked = false;
    $('#search').value = '';
    $$('.tile').forEach(function(t) {
        t.classList.remove('dim', 'highlight', 'active');
        t.style.display = '';
    });
    hideDetail();
}

function checkHash() {
    var h = location.hash.slice(1);
    if (h && DATA.find(function(d) { return d.id === h; })) {
        showDetail(h);
    }
}

init();
</script>
</body>
</html>
