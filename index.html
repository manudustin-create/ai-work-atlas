<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI & Work Atlas</title>
    <meta name="description" content="Mappa interattiva dei ruoli socio-tecnici dell'AI nel lavoro. Percorsi di lettura tra potenziamento, estrazione, giudizio, governo, visibilità e infrastruttura.">
    <meta property="og:title" content="AI & Work Atlas">
    <meta property="og:description" content="Mappa interattiva dei ruoli socio-tecnici dell'AI nel lavoro.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="AI & Work Atlas">
    <meta name="twitter:description" content="Mappa interattiva dei ruoli socio-tecnici dell'AI nel lavoro.">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="lenses">
    <span class="lenses-label">Lenti</span>
    <div class="lens-group" id="lenses"></div>
    <div class="spacer"></div>
    <input type="text" class="search" id="search" placeholder="Cerca...">
    <button class="reset-btn" id="reset">Reset</button>
    <button class="intro-btn" id="intro-btn" title="Guida alla mappa">?</button>
    <button class="tour-btn" id="tour-btn" title="Percorsi guidati">⟡</button>
    <label class="view-switch">
        <input type="checkbox" id="view-toggle">
        <span class="switch-track"><span class="switch-thumb"></span></span>
        <span class="switch-labels"><span class="switch-label-txt">Txt</span><span class="switch-label-img">Img</span></span>
    </label>
</nav>

<section class="top-bar">
    <div class="bands" id="bands"></div>
</section>

<div class="main-layout">
    <main class="matrix-area">
        <div class="matrix-wrap" aria-label="Matrice AI & Work con assi">
            <div class="axis axis-x">
                <div class="axis-label">Socio-technical roles of AI in work</div>
                <svg class="axis-arrow axis-arrow-x" viewBox="0 0 120 10" preserveAspectRatio="none" aria-hidden="true">
                    <defs>
                        <marker id="arrow-x" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
                            <path d="M0,0 L6,3 L0,6 Z" fill="var(--grey-30)"></path>
                        </marker>
                    </defs>
                    <line x1="0" y1="5" x2="118" y2="5" stroke="var(--grey-30)" stroke-width="1" marker-end="url(#arrow-x)"></line>
                </svg>
            </div>

            <div class="axis axis-y">
                <div class="axis-label">Governance scale</div>
                <svg class="axis-arrow axis-arrow-y" viewBox="0 0 10 120" preserveAspectRatio="none" aria-hidden="true">
                    <defs>
                        <marker id="arrow-y" markerWidth="6" markerHeight="6" refX="3" refY="5" orient="auto">
                            <path d="M0,0 L6,0 L3,6 Z" fill="var(--grey-30)"></path>
                        </marker>
                    </defs>
                    <line x1="5" y1="0" x2="5" y2="118" stroke="var(--grey-30)" stroke-width="1" marker-end="url(#arrow-y)"></line>
                </svg>
            </div>

            <div class="matrix" id="matrix"></div>
        </div>
    </main>
    
</div>

<div class="overlay-backdrop" id="overlay-backdrop"></div>
<div class="overlay-panel" id="overlay-panel">
    <div class="overlay-panel-content" id="overlay-content"></div>
</div>

<footer class="legend">
    <div class="legend-item"><span class="legend-color augment"></span> Augment</div>
    <div class="legend-item"><span class="legend-color govern"></span> Govern</div>
    <div class="legend-item"><span class="legend-color meaning"></span> Meaning</div>
    <div class="legend-item"><span class="legend-color extract"></span> Extract</div>
    <div class="legend-item"><span class="legend-color judge"></span> Judge</div>
    <div class="legend-item"><span class="legend-color architect"></span> Architect</div>
    <div class="legend-sep"></div>
    <div class="legend-item legend-sym"><span class="legend-symb">●</span> costitutivo/dominante</div>
    <div class="legend-item legend-sym"><span class="legend-symb">◐</span> rilevante ma non dominante</div>
    <div class="legend-item legend-sym"><span class="legend-symb">○</span> indiretto / effetto laterale</div>
</footer>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
